---
layout: default
---

<article class="post">
  <header class="post-header mb-4">
    <h1 class="post-title mb-2">{{ page.title }}</h1>
    {% if page.date %}
      <time class="post-date text-muted small">{{ page.date | date: "%B %d, %Y" }}</time>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
